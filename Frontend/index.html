<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkQuora</title>
    <meta name="description" content="WorkQuora — Connect clients with skilled freelancers. Find local jobs, post gigs, and get paid securely." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Runs before paint, before React mounts. Defaults to light
      // unconditionally — system prefers-color-scheme is intentionally
      // ignored; only an explicit localStorage 'theme'='dark' (set by the
      // user via the theme toggle) switches to dark. Mirrors web/'s
      // app/layout.tsx inline script so both apps behave identically.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
