name: workquora_client
description: WorkQuora - Find & Hire Nearby Workers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Not referenced directly in lib/, but Flutter's own Material widgets fall
  # back to CupertinoIcons glyphs for iOS-adaptive UI (e.g. the iOS-style
  # back icon) — removing this produced a build-time "expected font not
  # found" warning and would risk a missing icon glyph on iOS specifically.
  cupertino_icons: ^1.0.6
  dio: ^5.3.2
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pinput: ^3.0.1
  socket_io_client: ^2.0.3+1
  image_picker: ^1.0.7
  image_cropper: ^8.1.0
  flutter_svg: ^2.0.0
  geolocator: ^13.0.1
  web: ^1.1.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  google_maps_flutter: ^2.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^4.0.0

dependency_overrides:
  smart_auth: 2.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/client_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2E1CA8"
  adaptive_icon_foreground: "assets/icons/client_icon_fg.png"
  # client_icon.png has transparent corners outside its rounded-square shape
  # (from the SVG's clipPath) — the App Store rejects icons with any alpha
  # channel, since iOS applies its own corner mask at the OS level. This
  # flattens iOS's copy to opaque; Android's adaptive icon (which wants the
  # transparent corners, masked by the OS's own adaptive-icon shape) is
  # untouched.
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logos/
    - assets/images/categories/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 200
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 800
        - asset: assets/fonts/PlusJakartaSans-Italic-Variable.ttf
          style: italic

