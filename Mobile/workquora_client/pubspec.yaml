name: workquora_client
description: WorkQuora Client App (wQ Recruit) — Flutter, Riverpod, offline-first
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  dio: ^5.5.0
  pretty_dio_logger: ^1.3.1
