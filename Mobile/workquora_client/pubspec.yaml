name: workquora_client
description: WorkQuora - Find & Hire Nearby Workers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.2
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pinput: ^3.0.1
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  socket_io_client: ^2.0.3+1
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  web: ^1.1.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  google_maps_flutter: ^2.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^4.0.0

dependency_overrides:
  smart_auth: 2.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/client_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E00A9"
  adaptive_icon_foreground: "assets/icons/client_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/categories/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 200
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 800
        - asset: assets/fonts/PlusJakartaSans-Italic-Variable.ttf
          style: italic

