  fpdart: ^1.1.0

  formz: ^0.7.0

  socket_io_client: ^2.0.3+1
  razorpay_flutter: ^1.3.7
  image_picker: ^1.1.2

  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
