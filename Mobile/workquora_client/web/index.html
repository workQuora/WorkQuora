<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="workquora_client">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Google Sign-In (web) — needs a WEB OAuth client from the same Google
       Cloud project as Backend/.env's GOOGLE_CLIENT_ID, with this app's dev
       origin (e.g. http://localhost:PORT) added under Authorized JavaScript
       origins. See CLAUDE.md for exact console steps. Required by
       google_sign_in_web regardless of the Android/iOS client IDs used
       elsewhere — this is only for testing the client in a browser. -->
  <meta name="google-signin-client_id" content="REPLACE_WITH_WEB_GOOGLE_CLIENT_ID.apps.googleusercontent.com">


  <title>workquora_client</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
