<!-- Micro-interaction Script -->
<script>
        // Simple scale interaction for inputs
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('border-primary');
                el.parentElement.classList.remove('border-outline-subtle');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('border-primary');
                el.parentElement.classList.add('border-outline-subtle');
            });
        });

        // Form Submission visual feedback
        document.querySelector('button.bg-primary').addEventListener('click', (e) => {
            const btn = e.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = 'Saving...';
            btn.disabled = true;
            btn.classList.add('opacity-70');
            
            setTimeout(() => {
                btn.innerText = 'Profile Updated';
                btn.classList.replace('bg-primary', 'bg-secondary');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-secondary', 'bg-primary');
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                }, 1500);
            }, 1000);
        });
    </script>
